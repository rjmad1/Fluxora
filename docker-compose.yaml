version: '3.8'

services:
  # 1. Transactional Database
  postgres:
    image: postgres:16-alpine
    container_name: fluxora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: change-me-in-production
      POSTGRES_DB: fluxora_db
    ports:
      - "54321:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Identity Provider
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: fluxora-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "8081:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy

  # 3. Redis Queue
  redis:
    image: redis:7-alpine
    container_name: fluxora-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 4. Ingress / API Gateway (Kong in DB-less mode)
  kong:
    image: kong:3.8-ubuntu
    container_name: fluxora-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl http2
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8002:8000"
      - "8443:8443"
      - "8003:8001"
    volumes:
      - ./infra/kong:/usr/local/kong
    depends_on:
      - keycloak
      - backend

  # 5. Event Mesh (Apache Kafka)
  kafka:
    image: apache/kafka:3.8.0
    container_name: fluxora-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: fluxora-kafka-cluster-001
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # 6. Analytics Columnar Database (ClickHouse)
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: fluxora-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8124:8123"
      - "9001:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 7. Secrets Management (HashiCorp Vault - Dev Mode)
  vault:
    image: hashicorp/vault:1.17
    container_name: fluxora-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: fluxora-dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    volumes:
      - vault_data:/vault/data

  # 8. NestJS Backend Application
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: fluxora-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://postgres:change-me-in-production@postgres:5432/fluxora_db?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - VAULT_URL=http://vault:8200
      - VAULT_TOKEN=fluxora-dev-token
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=fluxora-backend
      - CLICKHOUSE_URL=http://clickhouse:8123
      - KEYCLOAK_SERVER_URL=http://keycloak:8080/auth
      - KEYCLOAK_REALM=fluxora
      - KEYCLOAK_CLIENT_ID=backend
      - KEYCLOAK_CLIENT_SECRET=secret
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      vault:
        condition: service_started

  # 9. Next.js Frontend Application
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: fluxora-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  clickhouse_data:
  vault_data:
