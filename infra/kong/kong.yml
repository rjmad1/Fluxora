_format_version: "3.0"
_transform: true

services:
  - name: fluxora-backend
    url: http://host.docker.internal:3000
    routes:
      - name: backend-routes
        paths:
          - /api/v1
        strip_path: false

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
        - X-Tenant-ID
        - X-Workspace-ID
      exposed_headers:
        - X-Tenant-ID
        - X-Workspace-ID
      credentials: true
      max_age: 3600
  - name: rate-limiting
    config:
      minute: 60
      policy: local
