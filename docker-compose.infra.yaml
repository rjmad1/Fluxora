version: '3.8'

services:
  # 1. Transactional Database
  postgres:
    image: postgres:16-alpine
    container_name: fluxora-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: change-me-in-production
      POSTGRES_DB: fluxora_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Identity Provider
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: fluxora-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "8081:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy

  # 3. Redis Queue
  redis:
    image: redis:7-alpine
    container_name: fluxora-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 4. Ingress / API Gateway (Kong in DB-less mode)
  kong:
    image: kong:3.6-alpine
    container_name: fluxora-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl http2
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
    volumes:
      - ./infra/kong:/usr/local/kong
    depends_on:
      - keycloak

volumes:
  postgres_data:
  redis_data:
